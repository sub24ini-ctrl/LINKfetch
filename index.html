<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bypass Link</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c1b 0%, #1a103c 100%);
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent: #a855f7;
            --accent-hover: #9333ea;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 680px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        .input-group {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            padding: 6px;
            border-radius: 16px;
            gap: 8px;
            margin-bottom: 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15);
        }

        input[type="url"] {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        input[type="url"]::placeholder {
            color: #555861;
        }

        button {
            padding: 12px 28px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #374151;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: all 0.2s;
            user-select: none;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .option input {
            accent-color: var(--accent);
            cursor: pointer;
        }

        .status {
            padding: 16px;
            border-radius: 14px;
            font-size: 0.9rem;
            margin-bottom: 25px;
            display: none;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
        }

        .status.show { display: flex; }
        .status.info { background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.2); color: #d8b4fe; }
        .status.success { background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.2); color: #6ee7b7; }
        .status.error { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .status.warning { background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2); color: #fde047; }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .manual-input {
            display: none;
            margin-bottom: 25px;
        }
        .manual-input.show { display: block; }
        
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 16px;
            color: #a7f3d0;
            font-family: monospace;
            font-size: 0.85rem;
            min-height: 140px;
            resize: vertical;
            outline: none;
        }
        textarea:focus { border-color: var(--accent); }

        .result {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 16px;
            padding: 24px;
            margin-top: 25px;
            display: none;
        }
        .result.show { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .result-url {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--panel-border);
            font-family: monospace;
            font-size: 0.9rem;
            color: #fff;
            word-break: break-all;
            margin-bottom: 20px;
        }

        .result-actions {
            display: flex;
            gap: 10px;
        }

        .btn-go { background: var(--success); }
        .btn-go:hover { background: #059669; }
        .btn-copy { background: rgba(255,255,255,0.08); color: var(--text-main); border: 1px solid var(--panel-border); }
        .btn-copy:hover { background: rgba(255,255,255,0.15); }
        .btn-reset { background: transparent; color: var(--text-muted); }
        .btn-reset:hover { color: #fff; }

        .supported {
            margin-top: 40px;
            border-top: 1px solid var(--panel-border);
            padding-top: 24px;
        }

        .supported h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--panel-border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #d1d5db;
        }
        .tag.highlight {
            border-color: rgba(168, 85, 247, 0.4);
            color: #e9d5ff;
            background: rgba(168, 85, 247, 0.05);
        }

        @media (max-width: 520px) {
            .container { padding: 24px; }
            .input-group { flex-direction: column; background: transparent; border: none; padding: 0; }
            input[type="url"], button { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--panel-border); border-radius: 12px; }
            button { background: var(--accent); }
            .result-actions { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bypass Link</h1>
        <p class="subtitle">Instantly clean links and circumvent destination loops</p>

        <div class="input-group">
            <input type="url" id="urlInput" placeholder="Paste target URL here..." autocomplete="off">
            <button onclick="handleBypass()" id="actionBtn">Bypass</button>
        </div>

        <div class="options">
            <label class="option">
                <input type="checkbox" id="useProxy" checked>
                <span>CORS Proxy Layer</span>
            </label>
            <label class="option">
                <input type="checkbox" id="manualMode">
                <span>Manual DOM Inspect</span>
            </label>
        </div>

        <div id="statusBox" class="status"></div>

        <div id="manualWrapper" class="manual-input">
            <textarea id="htmlInput" placeholder="Paste destination view-source HTML markup here if automatic extraction gets rate-limited..."></textarea>
        </div>

        <div id="resultBox" class="result">
            <div class="result-label">Resolved Destination</div>
            <div class="result-url" id="resultUrl"></div>
            <div class="result-actions">
                <button class="btn-go" onclick="launchLink()">Navigate</button>
                <button class="btn-copy" onclick="copyDestination()">Copy Link</button>
                <button class="btn-reset" onclick="clearAll()">Reset</button>
            </div>
        </div>

        <div class="supported">
            <h3>Optimized Pipeline Components</h3>
            <div class="tags">
                <span class="tag highlight">platorealy.com</span>
                <span class="tag">loot-links</span>
                <span class="tag">linkvertise</span>
                <span class="tag">ouo.io</span>
                <span class="tag">adf.ly</span>
                <span class="tag">bit.ly</span>
            </div>
        </div>
    </div>

    <script>
        const CLOUD_PROXIES = [
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url=',
            'https://api.codetabs.com/v1/proxy?quest='
        ];
        let rotationIdx = 0;
        let resolvedUri = '';

        document.getElementById('manualMode').addEventListener('change', (e) => {
            document.getElementById('manualWrapper').classList.toggle('show', e.target.checked);
        });

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleBypass();
        });

        function updateStatus(msg, type = 'info') {
            const box = document.getElementById('statusBox');
            if(!msg) { box.classList.remove('show'); return; }
            box.className = `status ${type} show`;
            box.innerHTML = type === 'info' ? `<div class="spinner"></div><span>${msg}</span>` : `<span>${msg}</span>`;
        }

        async function handleBypass() {
            const target = document.getElementById('urlInput').value.trim();
            const manual = document.getElementById('manualMode').checked;

            if (!target && !manual) return updateStatus('Please provide a URL asset.', 'error');
            
            const btn = document.getElementById('actionBtn');
            btn.disabled = true;
            updateStatus('Evaluating route structure...', 'info');

            try {
                let out;
                if (manual) {
                    const dynamicHtml = document.getElementById('htmlInput').value;
                    if(!dynamicHtml) throw new Error('Source context empty.');
                    out = evaluateDOM(dynamicHtml, target);
                } else {
                    out = await pullRoute(target);
                }

                if (out) {
                    resolvedUri = out;
                    document.getElementById('resultUrl').textContent = out;
                    document.getElementById('resultBox').classList.add('show');
                    updateStatus('Verification complete.', 'success');
                } else {
                    updateStatus('Deep extraction failed. Try using Manual DOM Inspect mode.', 'warning');
                }
            } catch (err) {
                updateStatus(`Pipeline error: ${err.message}`, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        async function pullRoute(uri) {
            // Priority 1: Direct structural parameter decoding
            const parametricMatch = searchParams(uri);
            if (parametricMatch) return parametricMatch;

            const proxyActive = document.getElementById('useProxy').checked;
            if (!proxyActive) {
                try {
                    const res = await fetch(uri, { method: 'GET', redirect: 'follow' });
                    return evaluateDOM(await res.text(), uri);
                } catch(e) {}
            }

            // Priority 2: Distributed Cloud Engine proxies
            for (let i = 0; i < CLOUD_PROXIES.length; i++) {
                const head = CLOUD_PROXIES[(rotationIdx + i) % CLOUD_PROXIES.length];
                try {
                    const edgeRes = await fetch(head + encodeURIComponent(uri));
                    if (!edgeRes.ok) continue;
                    const cleanHtml = await edgeRes.text();
                    const finalized = evaluateDOM(cleanHtml, uri);
                    if (finalized) {
                        rotationIdx = (rotationIdx + i) % CLOUD_PROXIES.length;
                        return finalized;
                    }
                } catch (e) {}
            }
            return null;
        }

        function evaluateDOM(html, base) {
            const parsedDoc = new DOMParser().parseFromString(html, 'text/html');

            // PlatoRealy, Linkvertise structural configurations and JSON payload captures
            if (base.includes('platorealy') || base.includes('auth.platorealy')) {
                // Look for common dynamic redirect variables script formats
                const scriptBlobs = parsedDoc.querySelectorAll('script');
                for (const node of scriptBlobs) {
                    const content = node.textContent;
                    // Match configurations containing target parameters inside token objects
                    const jsonExtractor = content.match(/"target"\s*:\s*"([^"]+)"/) || 
                                          content.match(/key\s*:\s*['"]([^'"]+)['"]/);
                    if(jsonExtractor) {
                        const san = jsonExtractor[1].replace(/\\/g, '');
                        if(san.startsWith('http')) return san;
                    }
                }
            }

            // Meta directives fallback logic
            const meta = parsedDoc.querySelector('meta[http-equiv="refresh"]');
            if (meta) {
                const directive = meta.getAttribute('content');
                const parsedTag = directive.match(/url=['"]?([^'";]+)['"]?/i);
                if (parsedTag) return safeCombine(parsedTag[1], base);
            }

            // JavaScript environment execution variable capture checks
            const standardPatterns = [
                /window\.location\.href\s*=\s*["']([^"']+)["']/,
                /window\.location\s*=\s*["']([^"']+)["']/,
                /location\.href\s*=\s*["']([^"']+)["']/,
                /"redirectUrl"\s*:\s*"([^"]+)"/,
                /"url"\s*:\s*"([^"]+)"/
            ];

            for (const scriptNode of parsedDoc.querySelectorAll('script')) {
                const text = scriptNode.textContent;
                for (const regex of standardPatterns) {
                    const extract = text.match(regex);
                    if (extract) {
                        const outputStr = extract[1].replace(/\\x([0-9A-Fa-f]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
                        if (outputStr && !outputStr.includes('javascript:')) return safeCombine(outputStr, base);
                    }
                }
            }

            // Anchor verification filters
            const hyperLinks = parsedDoc.querySelectorAll('a[href^="http"]');
            for (const item of hyperLinks) {
                if (item.href !== base && !item.href.includes(window.location.hostname)) {
                    if (!['google', 'facebook', 'captcha', 'recaptcha', 'ads'].some(x => item.href.includes(x))) {
                        return item.href;
                    }
                }
            }
            return null;
        }

        function searchParams(uri) {
            try {
                const instances = new URL(uri);
                const parameters = instances.searchParams;
                // Extended checking for downstream query structures
                const tags = ['url', 'link', 'target', 'redirect', 'goto', 'dest', 'destination', 'r', 'u', 'endpoint', 'to'];
                for (const parameterKey of tags) {
                    const targetString = parameters.get(parameterKey);
                    if (targetString) {
                        return targetString.startsWith('http') ? targetString : decodeURIComponent(targetString);
                    }
                }
                
                // Route check for base64 obfuscations
                const payloadMatch = uri.match(/[?&]([a-zA-Z0-9_-]{24,})/);
                if (payloadMatch) {
                    const plain = atob(payloadMatch[1]);
                    if (plain.startsWith('http')) return plain;
                }
            } catch (e) {}
            return null;
        }

        function safeCombine(url, base) {
            try { return new URL(url, base).href; } catch (e) { return url; }
        }

        function launchLink() { if (resolvedUri) window.open(resolvedUri, '_blank'); }

        function copyDestination() {
            if (resolvedUri) {
                navigator.clipboard.writeText(resolvedUri).then(() => {
                    const originalText = document.getElementById('statusBox').innerHTML;
                    updateStatus('Copied link target context.', 'success');
                    setTimeout(() => updateStatus(''), 1500);
                });
            }
        }

        function clearAll() {
            document.getElementById('urlInput').value = '';
            document.getElementById('htmlInput').value = '';
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('manualMode').checked = false;
            document.getElementById('manualWrapper').classList.remove('show');
            updateStatus('');
            resolvedUri = '';
        }
    </script>
</body>
</html>
